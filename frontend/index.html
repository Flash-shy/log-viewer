<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="api-base" content="http://127.0.0.1:8080" />
    <title>Log Viewer</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <div id="app" class="page page--list">
      <header class="top">
        <h1>Log Viewer</h1>
        <p class="hint">点击文件名在独立页面中查看内容（数据来自后端加载的 <code>logs/</code> 目录）</p>
      </header>
      <main class="list-main">
        <p id="status" class="status" role="status"></p>
        <ul id="log-list" class="log-list" aria-label="日志文件列表"></ul>
      </main>
    </div>
    <script type="module" src="scripts/list.js"></script>
  </body>
</html>
